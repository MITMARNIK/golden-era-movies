<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="Profile.css">
    <title>My Profile - Golden Era</title>
</head>
<body>

    <div class="container">
        <nav>
            <ul class="custom-navbar">
                <li class="navbar-logo">
                <a href="Profile.html">
                    <img src="Imagini\GoldenEra.png" alt="Golden Era Logo">
                </a>
                </li>
                <li><a href="index.html">Home</a></li>
                <li><a href="movies.html">Movies</a></li>
                <li><a href="TopMovies.html">Top Movies</a></li>
                <li><a href="actors.html">Actors</a></li>
                <li><a href="LoginRegisterChose.html">Login/Register</a></li>
                <li class="search-item">
                    <div class="search-box">
                        <input type="text" placeholder="Search movies...">
                        <button type="button">🔍</button>
                    </div>
                </li>
            </ul>    
        </nav>
    </div>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar">JD</div>
            <div class="profile-info">
                <h1>John Doe</h1>
                <p class="user-mail">john.doe@email.com</p>
                <div class="user-stats">
                    <span><strong>12</strong> Movies Watched</span>
                    <span><strong>5</strong> Reviews Posted</span>
                </div>
            </div>
            <button class="btn-edit">Edit Profile</button>
        </div>

        <div class="profile-content">
            <div class="content-section">
                <h2>Recently Watched</h2>
                <div class="mini-movie-grid">
                    <div class="mini-card">
                        <img src="Imagini\GodFather.jpg" alt="Movie">
                        <span>The Godfather</span>
                    </div>
                    <div class="mini-card"> 
                        <img src="Imagini\CasablancaPoster-Gold.jpg" alt="Movie">
                        <span>Casablanca</span>
                    </div>
                    <div class="mini-card">
                        <img src="Imagini\12 Angry MAN.jpg" alt="Movie">
                        <span>12 Angry Men</span>
                    </div>
                </div>
            </div>

            <div class="content-section">
                <h2>Account Settings</h2>
                <ul class="settings-list">
                    <li>Change Password <span>&rsaquo;</span></li>
                    <li>
                        <a href="watchlist.html" class="profile-link">Watchlist</a>
                        <span>&rsaquo;</span>
                    </li>
                    <li class="logout">Log Out</li>
                </ul>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Golden Era. All rights reserved.</p>
    </footer>

</body>
</html>
