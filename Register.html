<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="LoginRegister.css">
    <title>Golden Era</title>
</head>
<body>
<div class="auth-page-wrapper">
    <div class="auth-box">
        <h2 class="auth-title">Create <span>Account</span></h2>
        
        <form action="#" method="post">
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" placeholder="you@example.com" required>
            </div>

            <div class="input-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Create a password" required>
            </div>

            <button type="submit" class="auth-choice-btn btn-solid" style="margin-top: 10px;">Register</button>
        </form>

        <a href="LoginRegisterChose.html" class="back-link-auth">&larr; Back to options</a>
    </div>
</div>
</div>
</body>
</html>
