<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="LoginRegister.css">
    <title>Golden Era</title>
</head>
<body>
<div class="auth-page-wrapper">
    <div class="auth-box">
        <h2 class="auth-title">Account <span>Login</span></h2>
        
        <form action="#" method="post">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="auth-choice-btn btn-solid" style="margin-top: 10px;">Login</button>
        </form>

        <a href="LoginRegisterChose.html" class="back-link-auth">&larr; Back to options</a>
    </div>
</div>
</div>
</body>
</html>
